name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    strategy:
      fail-fast: false
      matrix:
        framework: [nuxt, react, solid, svelte, tanstack, vinext, vue]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Test vite 7
        if: matrix.framework != 'nuxt'
        uses: ./.github/actions/test-vite
        with:
          vite-version: "7"
          framework: ${{ matrix.framework }}

      - name: Test vite 8
        if: matrix.framework != 'svelte' && matrix.framework != 'nuxt'
        uses: ./.github/actions/test-vite
        with:
          vite-version: "8"
          framework: ${{ matrix.framework }}

      - name: Test rolldown-vite
        if: matrix.framework != 'svelte' && matrix.framework != 'nuxt'
        uses: ./.github/actions/test-vite
        with:
          vite-version: rolldown-vite
          framework: ${{ matrix.framework }}

      - name: Test nuxt
        if: matrix.framework == 'nuxt'
        uses: ./.github/actions/test-vite
        with:
          framework: nuxt
